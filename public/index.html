<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClawMonitor">
<meta name="theme-color" content="#09090f">
<meta name="color-scheme" content="dark">
<title>ClawMonitor</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="app.css?v=cf1">
</head>
<body>

<header>
  <div class="brand">
    <span class="claw-icon">🦞</span>
    <span>Claw</span>Monitor
  </div>
  <div class="header-right" id="header-buttons">
    <span id="refresh-status"></span>
    <button class="header-btn" id="refresh-btn" data-action="refresh" aria-label="Refresh">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M3 21v-5h5"/>
      </svg>
    </button>
  </div>
</header>

<main id="content">
  <!-- Pull-to-refresh indicator -->
  <div class="ptr-indicator" id="ptr">
    <span class="ptr-spin">↻</span>
    <span class="ptr-text">Pull to refresh</span>
  </div>
</main>

<nav class="tab-bar" id="tab-bar">
  <button class="tab-btn" id="tab-dashboard" data-action="tab" data-tab="dashboard">
    <span class="tab-icon">🏠</span>Home
  </button>
  <button class="tab-btn" id="tab-activity" data-action="tab" data-tab="activity">
    <span class="tab-icon">⚡</span>Activity
  </button>
  <button class="tab-btn" id="tab-agents" data-action="tab" data-tab="agents">
    <span class="tab-icon">🤖</span>Agents
  </button>
  <button class="tab-btn" id="tab-jobs" data-action="tab" data-tab="jobs">
    <span class="tab-icon">⏱</span>Jobs
  </button>
  <button class="tab-btn" id="tab-files" data-action="tab" data-tab="files">
    <span class="tab-icon">📁</span>Files
  </button>
  <button class="tab-btn" id="tab-logs" data-action="tab" data-tab="logs">
    <span class="tab-icon">📋</span>Logs
  </button>
  <button class="tab-btn" id="tab-settings" data-action="tab" data-tab="settings">
    <span class="tab-icon">⚙️</span>Settings
  </button>
</nav>

<!-- Modal (file viewer) -->
<div class="modal-backdrop" id="modal-backdrop"></div>
<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="modal-header">
    <button class="back-btn" data-action="close-modal">← Back</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div>

<!-- Toasts -->
<div id="toast-container"></div>

<!-- Confirm dialog backdrop -->
<div class="confirm-backdrop" id="confirm-backdrop"></div>

<script src="app.js?v=cf1" defer></script>
</body>
</html>
