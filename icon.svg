  <rect x="120" y="197" width="180" height="14" rx="7" fill="#1e2d3d"/>
  <rect x="120" y="229" width="60" height="14" rx="7" fill="#ef4444"/>
  <rect x="196" y="229" width="120" height="14" rx="7" fill="#1e2d3d"/>
  <rect x="120" y="261" width="140" height="14" rx="7" fill="#1e2d3d"/>
  <rect x="120" y="293" width="100" height="14" rx="7" fill="#f59e0b"/>
